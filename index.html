</html><!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilha Verde Middle School - 生字抽查</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .setup-section { margin-bottom: 20px; text-align: center; }
        .quiz-section { display: none; }
        .question-box { font-size: 1.2rem; margin: 20px 0; padding: 15px; background: #e8f4fd; border-radius: 8px; text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        .feedback { margin-top: 15px; font-weight: bold; text-align: center; }
        .correct { color: #27ae60; }
        .wrong { color: #e74c3c; }
        .stats { margin-top: 20px; font-size: 0.9rem; color: #7f8c8d; text-align: center; }
        select { padding: 8px; border-radius: 4px; margin: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>生字抽查系統</h2>
    
    <div id="setup" class="setup-section">
        <p>請選擇抽查範圍：</p>
        <select id="unitSelect">
            <option value="all">所有範圍</option>
            <option value="f5_u5">中五 Unit 5 (The Dress)</option>
            <option value="f4_u6">中四 Unit 6 (Hero)</option>
        </select>
        <br><br>
        <button onclick="startQuiz()">開始測試</button>
    </div>

    <div id="quiz" class="quiz-section">
        <div class="stats">進度: <span id="progress">0</span> / <span id="total">0</span></div>
        <div class="question-box">
            <div id="definition">定義將顯示在這裡</div>
        </div>
        <input type="text" id="answerInput" placeholder="請輸入英文單字或短語" autocomplete="off">
        <div style="display: flex; gap: 10px;">
            <button onclick="checkAnswer()" style="flex: 2;">提交答案</button>
            <button onclick="showHint()" style="flex: 1; background-color: #95a5a6;">提示</button>
        </div>
        <div id="feedback" class="feedback"></div>
        <button id="nextBtn" onclick="nextQuestion()" style="display:none; width:100%; margin-top:10px; background-color: #2ecc71;">下一題</button>
    </div>
</div>

<script>
const vocabData = [
    // F5 Unit 5
    { word: "break the internet", def: "引起網絡轟動", unit: "f5_u5" },
    { word: "image", def: "圖像", unit: "f5_u5" },
    { word: "instead of doing", def: "而不是", unit: "f5_u5" },
    { word: "meanwhile", def: "(與此)同時", unit: "f5_u5" },
    { word: "all over the world", def: "全世界", unit: "f5_u5" },
    { word: "argue", def: "爭論;爭吵", unit: "f5_u5" },
    { word: "actual", def: "實際的", unit: "f5_u5" },
    { word: "social media site", def: "社群媒體網站", unit: "f5_u5" },
    { word: "co-worker", def: "同事", unit: "f5_u5" },
    { word: "begin doing / to do", def: "開始", unit: "f5_u5" },
    { word: "channel", def: "頻道", unit: "f5_u5" },
    { word: "seem to do", def: "似乎;好像", unit: "f5_u5" },
    { word: "crazy", def: "荒唐的", unit: "f5_u5" },
    { word: "vision scientist", def: "視覺科學家", unit: "f5_u5" },
    { word: "depend on", def: "取決於", unit: "f5_u5" },
    { word: "interpret", def: "詮釋;解釋", unit: "f5_u5" },
    { word: "optical illusion", def: "視錯覺", unit: "f5_u5" },
    { word: "discover", def: "發現", unit: "f5_u5" },
    { word: "vase", def: "花瓶", unit: "f5_u5" },
    { word: "impossible", def: "不可能的", unit: "f5_u5" },
    { word: "stair", def: "階梯:樓梯", unit: "f5_u5" },
    { word: "psychology", def: "心理學", unit: "f5_u5" },
    { word: "experience", def: "經歷;體驗", unit: "f5_u5" },
    { word: "professor", def: "教授", unit: "f5_u5" },
    { word: "gorilla", def: "大猩猩", unit: "f5_u5" },
    { word: "notice", def: "注意到;看到", unit: "f5_u5" },
    { word: "look for", def: "尋找", unit: "f5_u5" },
    { word: "pay attention to", def: "專注於", unit: "f5_u5" },
    { word: "joke", def: "笑話", unit: "f5_u5" },
    { word: "separate", def: "單獨的", unit: "f5_u5" },
    { word: "syllable", def: "音節", unit: "f5_u5" },
    { word: "blend", def: "混合:融合", unit: "f5_u5" },
    { word: "perception", def: "見解:感知", unit: "f5_u5" },
    { word: "explanation", def: "解釋;說明", unit: "f5_u5" },
    { word: "delighted", def: "欣喜的", unit: "f5_u5" },
    { word: "be able to do", def: "能夠", unit: "f5_u5" },
    { word: "point of view", def: "觀點;看法", unit: "f5_u5" },
    { word: "continue to do", def: "繼續", unit: "f5_u5" },
    { word: "fascinate", def: "使著迷", unit: "f5_u5" },
    { word: "perspective", def: "角度;觀點", unit: "f5_u5" },

    // F4 Unit 6
    { word: "define", def: "下定義", unit: "f4_u6" },
    { word: "literature", def: "文學", unit: "f4_u6" },
    { word: "religion", def: "宗教", unit: "f4_u6" },
    { word: "around the world", def: "世界各地", unit: "f4_u6" },
    { word: "myth", def: "神話", unit: "f4_u6" },
    { word: "similar", def: "相似的", unit: "f4_u6" },
    { word: "whether", def: "是否;無論", unit: "f4_u6" },
    { word: "shape", def: "形狀", unit: "f4_u6" },
    { word: "detail", def: "細節", unit: "f4_u6" },
    { word: "during", def: "在…期間", unit: "f4_u6" },
    { word: "journey", def: "旅行;旅程", unit: "f4_u6" },
    { word: "adventure", def: "冒險", unit: "f4_u6" },
    { word: "outer space", def: "外太空", unit: "f4_u6" },
    { word: "safety", def: "安全;平安", unit: "f4_u6" },
    { word: "mentor", def: "導師", unit: "f4_u6" },
    { word: "castle", def: "城堡", unit: "f4_u6" },
    { word: "challenge", def: "挑戰", unit: "f4_u6" },
    { word: "solve a problem", def: "解決問題", unit: "f4_u6" },
    { word: "strength", def: "力量;體力", unit: "f4_u6" },
    { word: "dragon", def: "龍", unit: "f4_u6" },
    { word: "succeed", def: "成功", unit: "f4_u6" },
    { word: "acquire", def: "取得:獲得", unit: "f4_u6" },
    { word: "knowledge", def: "知識;學問", unit: "f4_u6" },
    { word: "be affected by", def: "受…影響", unit: "f4_u6" },
    { word: "at first", def: "起初", unit: "f4_u6" },
    { word: "dangerous", def: "危險的", unit: "f4_u6" },
    { word: "enemy", def: "敵人", unit: "f4_u6" },
    { word: "overcome", def: "克服", unit: "f4_u6" },
    { word: "monster", def: "怪物", unit: "f4_u6" },
    { word: "face a fear", def: "面對恐懼", unit: "f4_u6" },
    { word: "intelligence", def: "智力;智慧", unit: "f4_u6" },
    { word: "trust", def: "信任", unit: "f4_u6" },
    { word: "return", def: "歸來", unit: "f4_u6" },
    { word: "wealth", def: "財富", unit: "f4_u6" },
    { word: "wisdom", def: "智慧", unit: "f4_u6" },
    { word: "embarrassed", def: "尷尬的", unit: "f4_u6" },
    { word: "alive", def: "活著的", unit: "f4_u6" },
    { word: "struggle", def: "掙扎;鬥爭", unit: "f4_u6" },
    { word: "treasure", def: "寶藏;珍寶", unit: "f4_u6" },
    { word: "cave", def: "洞穴", unit: "f4_u6" },
    { word: "stumble", def: "絆腳;絆倒", unit: "f4_u6" },
    { word: "opportunity", def: "機會", unit: "f4_u6" }
];

let currentPool = [];
let currentIndex = 0;

function startQuiz() {
    const range = document.getElementById('unitSelect').value;
    currentPool = range === 'all' ? [...vocabData] : vocabData.filter(i => i.unit === range);
    
    // Shuffle
    currentPool.sort(() => Math.random() - 0.5);
    
    currentIndex = 0;
    document.getElementById('total').innerText = currentPool.length;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('quiz').style.display = 'block';
    showQuestion();
}

function showQuestion() {
    const q = currentPool[currentIndex];
    document.getElementById('definition').innerText = q.def;
    document.getElementById('progress').innerText = currentIndex + 1;
    document.getElementById('answerInput').value = '';
    document.getElementById('feedback').innerText = '';
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('answerInput').focus();
}

function checkAnswer() {
    const userAns = document.getElementById('answerInput').value.trim().toLowerCase();
    const correctAns = currentPool[currentIndex].word.toLowerCase();
    const feedback = document.getElementById('feedback');

    if (userAns === correctAns) {
        feedback.innerText = "正確！ Excellent!";
        feedback.className = "feedback correct";
        document.getElementById('nextBtn').style.display = 'block';
    } else {
        feedback.innerText = "再試試看！";
        feedback.className = "feedback wrong";
    }
}

function showHint() {
    const correctAns = currentPool[currentIndex].word;
    const hint = correctAns.charAt(0) + "..." + correctAns.charAt(correctAns.length - 1);
    alert("提示: " + hint + " (長度: " + correctAns.length + " 個字元)");
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex < currentPool.length) {
        showQuestion();
    } else {
        alert("恭喜！你已完成所有單字複習。");
        location.reload();
    }
}

// 支援 Enter 鍵
document.getElementById("answerInput").addEventListener("keyup", function(event) {
    if (event.key === "Enter") {
        if (document.getElementById('nextBtn').style.display === 'block') {
            nextQuestion();
        } else {
            checkAnswer();
        }
    }
});
</script>

</body>
</html>
